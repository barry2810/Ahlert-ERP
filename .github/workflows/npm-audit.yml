name: NPM Audit

on:
  pull_request:
  push:
    branches: ["main", "master"]
  schedule:
    - cron: "0 3 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install API deps
        working-directory: apps/api
        run: npm install
      - name: NPM Audit (high+)
        working-directory: apps/api
        run: npm audit --omit=dev --audit-level=high
