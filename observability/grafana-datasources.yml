apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: 1h
        spanEndTimeShift: 1h
        tags: ["service", "env", "event", "level", "requestId", "errorCode"]
        filterByTraceID: false
        filterBySpanID: false
        customQuery: true
        query: '{service="${__span.tags.service}"} | json | traceId="${__trace.traceId}"'
