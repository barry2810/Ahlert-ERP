services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: public.ecr.aws/docker/library/redis:7
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - ./redis-data:/data
    restart: unless-stopped

  api:
#   image: ghcr.io/ahlert/erp-api:latest
#   environment:
#   DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
#   REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
#   PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    build: ./apps/api
    volumes:
      - ./import:/import:ro
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      ERP_ALLOW_INSECURE_HEADERS: "true"
      ERP_SERVICE_NAME: ahlert-erp-api
      DEPLOYMENT_ENVIRONMENT: local
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: ahlert-erp-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      ERP_HTTPS_PROXY: ${ERP_HTTPS_PROXY}
      ERP_EXTRA_CA_PEM_PATH: ${ERP_EXTRA_CA_PEM_PATH}
      ERP_EXTRA_CA_PEM_BASE64: ${ERP_EXTRA_CA_PEM_BASE64}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build: ./apps/api
    command: ["node", "--import", "/app/otel.mjs", "/app/server.mjs", "worker"]
    volumes:
      - ./import:/import:ro
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      ERP_ALLOW_INSECURE_HEADERS: "true"
      ERP_SERVICE_NAME: ahlert-erp-worker
      DEPLOYMENT_ENVIRONMENT: local
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: ahlert-erp-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      ERP_HTTPS_PROXY: ${ERP_HTTPS_PROXY}
      ERP_EXTRA_CA_PEM_PATH: ${ERP_EXTRA_CA_PEM_PATH}
      ERP_EXTRA_CA_PEM_BASE64: ${ERP_EXTRA_CA_PEM_BASE64}
      ERP_WORKER_ID: worker-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

# web:
#    image: ghcr.io/ahlert/erp-web:latest
#    environment:
#      NEXT_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
#      API_BASE_URL: http://api:3000
#    depends_on:
#      - api
#    restart: unless-stopped

  caddy:
    image: public.ecr.aws/docker/library/caddy:2
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./site:/srv
      - ./caddy-data:/data
    depends_on:
      - api
#      - web
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./observability/otel-collector.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "4318:4318"
      - "4317:4317"
      - "8889:8889"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    command: ["-config.file=/etc/loki.yml"]
    volumes:
      - ./observability/loki.yml:/etc/loki.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    command: ["-config.file=/etc/promtail.yml"]
    volumes:
      - ./observability/promtail.yml:/etc/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-data:/tmp
    depends_on:
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.1
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus", "--web.enable-lifecycle"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command: ["--config.file=/etc/alertmanager/alertmanager.yml", "--storage.path=/alertmanager"]
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.1
    ports:
      - "9100:9100"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

volumes:
  tempo-data:
  loki-data:
  promtail-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:
